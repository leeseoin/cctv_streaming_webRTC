server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 캐시 설정
    location ~* \.(js|css|svg|png|jpg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
