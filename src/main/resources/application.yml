spring:
  application:
    name: webrtc

  # 터미널 색 추가
  output:
    ansi:
      enabled: always

  threads:
    virtual:
      enabled: true

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

app:
  go2rtc:
    binary: ./go2rtc
    config: ./go2rtc.yml
    api-url: http://localhost:1984
