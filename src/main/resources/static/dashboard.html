<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Dashboard - 40CH</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="header">
        <h1>CCTV Dashboard - 40CH</h1>
        <div class="header-controls">
            <div class="mode-switch">
                <button class="mode-btn active" data-mode="webrtc" onclick="setStreamMode(this)">WebRTC</button>
                <button class="mode-btn" data-mode="hls" onclick="setStreamMode(this)">HLS</button>
            </div>
            <div class="channel-select">
                <label>채널 수:</label>
                <select id="channelCount" onchange="updateChannelCount()">
                    <option value="1">1</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="30">30</option>
                    <option value="35">35</option>
                    <option value="40" selected>40</option>
                </select>
            </div>
            <div class="stats" id="stats">연결: 0/40</div>
            <button onclick="connectAll()">전체 연결</button>
            <button onclick="disconnectAll()">전체 해제</button>
            <button class="btn-test" onclick="testFailover()">Failover 테스트</button>
            <a href="/">단일 뷰</a>
            <a href="/monitor.html">모니터</a>
            <a href="/nms.html">NMS</a>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="fullscreen-overlay" id="fullscreen">
        <button class="close-btn" onclick="closeFullscreen()">✕</button>
        <video id="fullscreen-video" autoplay muted playsinline></video>
        <div class="cam-title" id="fullscreen-title"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
