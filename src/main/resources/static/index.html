<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Streamer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; color: #e94560; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        select, button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        select { background: #16213e; color: #eee; }
        button { background: #e94560; color: #fff; }
        button:hover { background: #c73e54; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status {
            margin-bottom: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        .connected { background: #2d6a4f; }
        .disconnected { background: #6a2d2d; }
        .connecting { background: #6a5a2d; }
        video {
            width: 100%;
            max-width: 960px;
            background: #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>CCTV Streamer</h1>

    <div class="controls">
        <select id="cameraSelect">
            <option value="cam01">cam01 (메인)</option>
            <option value="cam01_sub">cam01_sub (서브)</option>
        </select>
        <button id="connectBtn" onclick="connect()">연결</button>
        <button id="disconnectBtn" onclick="disconnect()" disabled>해제</button>
    </div>

    <div id="status" class="disconnected">연결 안 됨</div>

    <video id="video" autoplay muted playsinline></video>

    <script>
        let pc = null;
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        async function connect() {
            const cameraId = document.getElementById('cameraSelect').value;

            setStatus('연결 중...', 'connecting');
            connectBtn.disabled = true;

            try {
                pc = new RTCPeerConnection();

                pc.ontrack = (event) => {
                    video.srcObject = event.streams[0];
                    setStatus('연결됨 - ' + cameraId, 'connected');
                    disconnectBtn.disabled = false;
                };

                pc.oniceconnectionstatechange = () => {
                    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                        setStatus('연결 끊김', 'disconnected');
                        disconnect();
                    }
                };

                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // ICE gathering 완료 대기
                if (pc.iceGatheringState !== 'complete') {
                    await new Promise(resolve => {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        };
                    });
                }

                // Java 서버에 SDP offer 전송
                const response = await fetch(`/api/cameras/${cameraId}/webrtc`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: pc.localDescription.type,
                        sdp: pc.localDescription.sdp
                    })
                });

                if (!response.ok) {
                    throw new Error('서버 응답 오류: ' + response.status);
                }

                const answer = await response.json();
                await pc.setRemoteDescription(answer);

            } catch (e) {
                console.error('연결 실패:', e);
                setStatus('연결 실패: ' + e.message, 'disconnected');
                connectBtn.disabled = false;
                disconnect();
            }
        }

        function disconnect() {
            if (pc) {
                pc.close();
                pc = null;
            }
            video.srcObject = null;
            setStatus('연결 안 됨', 'disconnected');
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        }

        function setStatus(text, className) {
            status.textContent = text;
            status.className = className;
        }
    </script>
</body>
</html>
