services:
  go2rtc:
    build:
      context: .
      dockerfile: docker/go2rtc/Dockerfile
    container_name: go2rtc
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker/go2rtc/go2rtc.yml:/config/go2rtc.yaml
      - ./docker/go2rtc/certs:/certs:ro
    ports:
      - "1984:1984"   # API HTTP (Spring Boot에서 접근)
      - "8443:443"    # API HTTPS (go2rtc 자체 SSL, HTTP/2)
      - "8555:8555"   # WebRTC UDP
      - "8554:8554"   # RTSP 리스트림
    depends_on:
      - mediamtx

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml
    ports:
      - "8553:8553"   # RTSP (호스트 FFmpeg에서 push)

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  prometheus_data:
