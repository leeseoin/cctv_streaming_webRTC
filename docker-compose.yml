# ═══════════════════════════════════════════════════════════
# On-Premise Docker Compose (우분투 서버 배포용)
#
# Docker Hub 이미지 사용 (빌드 없음)
# seoin0319/chatbot-poc:go2rtc
# seoin0319/chatbot-poc:go2rtc-exporter
#
# 사전 준비:
#   1. .env 파일 생성 (CAM_RTSP_USER, CAM_RTSP_PASS, CAM_IP)
#   2. docker/go2rtc/go2rtc.yml 서버 환경에 맞게 수정 (candidates)
#   3. docker/go2rtc/certs/ 에 SSL 인증서 배치 (cert.pem, key.pem)
#   4. 공유기 포트포워딩: 443→8443(TCP), 8555(UDP), 80(임시)
# ═══════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────
  # 스트리밍
  # ─────────────────────────────────────

  go2rtc:
    image: seoin0319/chatbot-poc:go2rtc
    container_name: go2rtc
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker/go2rtc/go2rtc.yml:/config/go2rtc.yaml
      - ./docker/go2rtc/certs:/certs:ro
    ports:
      - "1984:1984" # API HTTP
      # - "8443:8443/tcp"    # API HTTPS # 8443 TCP 제거, Nginx가 대신 잡음
      - "8443:8443/udp" # WebRTC UDP
      - "8554:8554" # RTSP 리스트림
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml
    ports:
      - "8553:8553" # RTSP (에뮬레이터)

  # ─────────────────────────────────────
  # ptz(Spring Boot)
  # ─────────────────────────────────────

  ptz-service:
    image: seoin0319/chatbot-poc:cctv-spring-boot
    container_name: ptz-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=onprem
    ports:
      - "8086:8085"

  # ─────────────────────────────────────
  # 모니터링
  # ─────────────────────────────────────

  go2rtc-exporter:
    image: seoin0319/chatbot-poc:go2rtc-exporter
    container_name: go2rtc-exporter
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "1985:1985" # Prometheus 스크랩
    depends_on:
      - go2rtc

  # camera-label-exporter: 카메라 ID → 현장명 매핑을 Prometheus 메트릭(camera_info)으로 노출
  # - cameras.yml 편집 → 30초 내 자동 반영 (재시작 불필요)
  # - Grafana Table 패널에서 camera_info + Transform(Labels to fields)으로 별도 표 생성
  camera-label-exporter:
    image: seoin0319/chatbot-poc:camera-label-exporter
    container_name: camera-label-exporter
    restart: unless-stopped
    volumes:
      - ./docker/camera-label-exporter/cameras.yml:/app/cameras.yml:ro
    ports:
      - "1986:1986" # Prometheus 스크랩 엔드포인트

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    # ports:
    #   - "9100:9100"   # Prometheus 스크랩

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # Prometheus Web UI + API
    depends_on:
      - go2rtc-exporter
      - node-exporter

volumes:
  prometheus_data:
